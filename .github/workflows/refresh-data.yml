name: Refresh UK Sanctions List

# Downloads the official FCDO UK Sanctions List weekly and publishes the rebuilt data as a
# GitHub Release asset (tag "data"). The installed tool auto-fetches that asset on startup
# (cached locally, offline-safe), so users always get fresh data with NO npm token and NO
# manual step. Uses only the built-in GITHUB_TOKEN — no secrets to set up.

on:
  schedule:
    - cron: "0 7 * * 1" # Mondays 07:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci

      - name: Download the official UK Sanctions List CSV
        run: |
          curl -fSL --retry 3 "https://sanctionslist.fcdo.gov.uk/docs/UK-Sanctions-List.csv" -o UK-Sanctions-List.csv
          ls -la UK-Sanctions-List.csv

      - name: Rebuild + gzip the data artifact
        run: |
          node scripts/build-data.mjs UK-Sanctions-List.csv data/sanctions.json
          node -e "const d=require('./data/sanctions.json');if(d.count<1000){console.error('too few targets:',d.count);process.exit(1)}console.log('targets',d.count,'report',d.version)"
          gzip -kf data/sanctions.json
          ls -lh data/sanctions.json.gz

      - name: Publish artifact to the "data" release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view data >/dev/null 2>&1 || gh release create data \
            --title "UK Sanctions List data" \
            --notes "Rolling artifact auto-fetched by the installed tool. Refreshed weekly by CI. Source: official FCDO UK Sanctions List (Crown copyright, Open Government Licence v3.0)."
          gh release upload data data/sanctions.json.gz --clobber
          echo "Published sanctions.json.gz to the 'data' release."
